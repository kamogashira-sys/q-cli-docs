title: "猫でもわかる kiro-cli アップデート情報"
description: "Kiro CLI（旧 Amazon Q Developer CLI）のアップデート解説ドキュメント。本体は GitHub リポジトリで公開しています。"
baseurl: "/q-cli-docs"
url: "https://kamogashira-sys.github.io"

# Theme
theme: minima

# Markdown processor
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO
lang: ja
author: Q CLI Documentation Project

# Navigation
# （front matter を持つページのみ Jekyll の処理対象。docs/ 配下の .md は
#   front matter なしのため HTML 化されず、ナビには index.md のみ載せる）
header_pages:
  - index.md

# Exclude from processing
exclude:
  - .github/
  - node_modules/
  - vendor/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
